name: platform_app
description: African Talent Platform mobile app — Phase 2

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.0

  # Navigation
  go_router: ^14.6.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # UI
  google_fonts: ^6.2.1

  # Storage & cache
  shared_preferences: ^2.3.3

  # HTTP
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
